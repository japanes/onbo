# The whole application in Docker. One command brings up everything:
#
#   docker compose up -d          # infra + bootstrap + app + demo backend
#   docker compose logs -f app    # follow the assistant
#   docker compose run --rm test  # hermetic pytest suite (dev profile)
#
# The only thing left outside is the model itself. By default onbo talks to
# OpenAI (chat gpt-5.6-terra + embeddings text-embedding-3-large), so .env needs
# one line: OPENAI_API_KEY=sk-... Alternatives (see .env.example, a ready block
# per provider):
#   - another hosted vendor: LLM_MODEL=... + LLM_API_KEY=... (no LLM_API_BASE)
#   - Ollama on the host (your GPU):
#       LLM_API_BASE=http://host.docker.internal:11434
#       plus OLLAMA_HOST=0.0.0.0 on the host, or the container can't reach it
#   - Ollama in Docker (no host install, CPU-only):
#       docker compose --profile ollama up -d   +   LLM_API_BASE=http://ollama:11434
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "16333:6333"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:   # no curl in the image; raw TCP probe (bash-only syntax)
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: onbo
      POSTGRES_PASSWORD: onbo
      POSTGRES_DB: onbo
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onbo -d onbo"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # One-shot bootstrap: create the schema, index the self-docs into the `about`
  # collection so the assistant can at least explain itself, and embed the
  # command catalogue so the classifier can search it instead of reading all of
  # actions.yaml on every message. No sample FAQ and no demo users — the
  # knowledge base and the user directory start empty and are yours to fill
  # (`onbo kb import`, `onbo users import`).
  # Idempotent, so it is safe on every `up`. `app` waits for it to finish.
  bootstrap:
    build:
      context: .
      target: base
    command: >
      sh -c "onbo about && onbo actions reindex"
    restart: "no"
    environment: &onbo_env
      QDRANT_URL: http://qdrant:6333
      POSTGRES_DSN: postgresql+psycopg://onbo:onbo@postgres:5432/onbo
      REDIS_URL: redis://redis:6379/0
      PRODUCT_API_BASE: ${PRODUCT_API_BASE:-http://demo-backend:18100}  # demo backend by default
      # LLM_MODEL / LLM_API_KEY / LLM_API_BASE come from .env (env_file below),
      # so a hosted vendor needs no api_base and Ollama users set theirs once.
      STT_DEVICE: cpu             # no GPU inside the container
      STT_COMPUTE: int8
      STT_MODEL: ${STT_MODEL:-base}   # large-v3 on CPU is slow and a 3 GB download
      FASTEMBED_CACHE_PATH: /root/.cache/fastembed   # embeddings land in the cache volume
      HF_HOME: /root/.cache/huggingface              # ... and so do the whisper weights
    env_file:
      - path: .env
        required: false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app                    # live edits without a rebuild (editable install)
      - modelcache:/root/.cache            # embedding/STT weights survive rebuilds
    depends_on:
      postgres: {condition: service_healthy}
      qdrant: {condition: service_healthy}
      redis: {condition: service_healthy}

  app:
    build:
      context: .
      target: base
    command: onbo serve web
    environment: *onbo_env
    env_file:
      - path: .env
        required: false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # ./media is part of this mount, so videos and the demo chat page stay
      # visible and editable from the host.
      - .:/app
      - modelcache:/root/.cache
    depends_on:
      bootstrap: {condition: service_completed_successfully}
      demo-backend: {condition: service_started}
    ports:
      - "18000:18000"

  # Built-in fake product backend (onbo demo-backend) so real HTTP actions have
  # something to call end-to-end. Same image as `app`.
  demo-backend:
    build:
      context: .
      target: base
    command: onbo demo-backend --port 18100
    volumes:
      - .:/app
    ports:
      - "18100:18100"

  # Optional: Ollama inside Docker for machines without a host install. CPU-only
  # (GPU passthrough needs nvidia-container-toolkit), so expect slow replies.
  #   docker compose --profile ollama up -d   +   LLM_API_BASE=http://ollama:11434
  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama

  # Hermetic pytest suite in a lean container (no Qdrant/Postgres/Redis/LLM
  # needed — the tests use fakes + qdrant-client :memory:). Source is mounted so
  # edits run without a rebuild. `--profile dev` keeps it off the default `up`.
  test:
    build:
      context: .
      target: test
    profiles: ["dev"]
    volumes:
      - .:/app
    command: ["pytest", "-q"]

volumes:
  pgdata:
  qdrantdata:
  modelcache:
  ollamadata:
