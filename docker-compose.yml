# Local stack: app + postgres + qdrant + redis.
services:
  app:
    build: .
    command: onbo serve web
    env_file: .env
    depends_on: [postgres, qdrant, redis]
    ports:
      - "8000:8000"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: onbo
      POSTGRES_PASSWORD: onbo
      POSTGRES_DB: onbo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
  qdrantdata:
