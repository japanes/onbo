# Action registry. New action = new entry here + one handler file. core/ untouched.
# mode: chat (do now) | confirm (Ok/Cancel first) | link (sensitive -> link only).
# Rule: sensitive: true always forces mode: link.
#
# A param's `description:` is what the assistant is allowed to say about it: it
# tells the model what to extract, and it is the question the user is asked when
# the message did not say ("Чтобы «Отгрузить заказ», уточните: номер заказа").
# Skip it only where the name already reads as a question, like `new_email`.
#
# `keywords:` and `examples:` are the opposite of `description:` — they are never
# shown and never sent to the model. This catalogue is embedded into Qdrant and
# searched on every message (only the ~12 closest commands reach the prompt), so
# these two lists exist purely to make a command findable: the slang, the second
# language, the phrasings people actually type. Free at answer time.

actions:
  set_language:                       # low risk -> execute immediately
    description: "Сменить язык интерфейса"
    keywords: [язык, локализация, language, switch to english]
    examples: ["переключи на английский", "хочу интерфейс по-русски"]
    mode: chat
    params:
      lang:
        type: enum
        values: [ru, en]
        required: true
        description: "на какой язык"
    # No handler file: the `api:` block below is executed generically.
    api:
      method: POST
      path: "/api/users/{user_id}/language"
      body: { language: "{lang}" }
      success_message: "Язык интерфейса переключён на «{lang}»."

  change_email:                       # reversible-but-important -> confirm
    description: "Сменить email"
    mode: confirm
    confirm_prompt: "Поменять email на {new_email}?"
    params:
      new_email: { type: email, required: true }
    handler: handlers.actions.change_email   # custom validation (email shape)
    api:
      method: POST
      path: "/api/users/{user_id}/email"
      body: { email: "{new_email}" }
      success_message: "Email изменён на {new_email}."

  change_password:                    # sensitive -> link only, never in chat
    description: "Сменить пароль"
    mode: link
    link_url: "https://app.example.com/settings/security"
    sensitive: true

  change_phone:                       # sensitive personal data -> link only
    description: "Сменить телефон"
    mode: link
    link_url: "https://app.example.com/settings/profile"
    sensitive: true

  # -- steps that make up the new_order pipeline below --------------------------
  # Each is a normal action (usable on its own); the pipeline just chains them.
  create_invoice_internal:
    description: "Выставить накладную себе"
    mode: chat
    params:
      order_id: { type: string, required: true }
    api:
      method: POST
      path: "/api/orders/{order_id}/invoice"
      body: { party: internal }
      success_message: "Накладная себе по заказу {order_id} создана."

  # A parameter whose values are a directory in your product, not a fixed list:
  # the person says «со склада в Милане», the API wants the row id. `lookup:` says
  # where to read the list — with this person's own credential, so they are only
  # ever offered what they may see. One match is substituted, several are asked
  # about, none shows what does exist, and «уточните: с какого склада» becomes the
  # live list. `{warehouse_label}` holds the readable name, for the confirmation.
  ship_order:
    description: "Отгрузить заказ"
    mode: confirm
    confirm_prompt: "Отгрузить заказ #{order_id} со склада {warehouse_label}?"
    params:
      order_id: { type: string, required: true, description: "номер заказа" }
      warehouse:
        required: true
        description: "с какого склада"
        lookup:
          path: "/api/warehouses"   # or an absolute url:
          items: "data"      # where the list sits in the response ("" = the body)
          value: "id"        # what the API is given
          label: "name"      # what a person calls it
          match: [code, city]  # other fields their wording may match
    api:
      method: POST
      path: "/api/orders/{order_id}/shipments"
      body: { warehouse: "{warehouse}" }
      success_message: "Заказ {order_id} отгружен со склада {warehouse_label}."

  create_invoice_client:
    description: "Выставить накладную клиенту"
    mode: chat
    params:
      order_id: { type: string, required: true }
    api:
      method: POST
      path: "/api/orders/{order_id}/invoice"
      body: { party: client }
      success_message: "Накладная клиенту по заказу {order_id} создана."

  send_invoice_to_client:
    description: "Отправить накладную клиенту"
    mode: chat
    params:
      order_id: { type: string, required: true }
    api:
      method: POST
      path: "/api/orders/{order_id}/send"
      success_message: "Накладные по заказу {order_id} отправлены клиенту."

# Pipelines: a batch of actions run on one command, with a single confirmation.
# A step may only reference a chat/confirm action — never a sensitive (link) one.
pipelines:
  new_order:
    description: "Оформить заказ: накладные себе и клиенту, отправка клиенту"
    mode: confirm                       # chat | confirm (link is forbidden)
    confirm_prompt: "Оформить заказ {order_id} и отправить накладные?"
    roles: [accountant]                 # audience filter (welcome/about): бухгалтеры
    params:
      order_id: { type: string, required: true }
    steps:
      - action: create_invoice_internal
        params: { order_id: "{order_id}" }
      - action: create_invoice_client
        params: { order_id: "{order_id}" }
      - action: send_invoice_to_client
        params: { order_id: "{order_id}" }
    on_error: stop                      # stop | continue
